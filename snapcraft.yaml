---
name: koko
confinement: strict
grade: stable
base: core24
adopt-info: koko
apps:
  koko:
    extensions:
      - kde-neon-6
    common-id: org.kde.koko.desktop
    desktop: usr/share/applications/org.kde.koko.desktop
    command: usr/bin/koko
    plugs:
      - home
      - audio-playback
    environment:
      ALSA_CONFIG_PATH: "$SNAP/kf6/etc/asound.conf"
layout:
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/alsa-lib:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/alsa-lib
slots:
  session-dbus-interface:
    interface: dbus
    name: org.kde.koko
    bus: session
parts:
  kquickimageeditor:
    plugin: cmake
    source: https://invent.kde.org/libraries/kquickimageeditor.git
    source-branch: 0.6
    build-snaps:
      - kde-qt6-core24-sdk/latest/stable
      - kf6-core24-sdk/latest/stable
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DBUILD_TESTING=OFF
  exiv2:
    plugin: cmake
    source: https://github.com/Exiv2/exiv2.git
    source-tag: v0.28.8
    build-snaps:
      - kde-qt6-core24-sdk/latest/stable
      - kf6-core24-sdk/latest/stable
    build-packages:
      - zlib1g-dev
      - libexpat1-dev
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DBUILD_TESTING=OFF
  koko:
    after:
      - kquickimageeditor
      - exiv2
    parse-info:
      - usr/share/metainfo/org.kde.koko.appdata.xml
    plugin: cmake
    source: .
    source-type: local
    build-snaps:
      - kde-qt6-core24-sdk/latest/stable
      - kf6-core24-sdk/latest/stable
    build-packages:
      - libpulse0
      - libexiv2-dev
      - libxkbcommon-dev
      - libbrotli-dev
    stage-packages:
      - libpulse0
      - libasound2
      - libasound2-plugins
      - libasound2-data
      - libexiv2-27
      - libxkbcommon0
      - sqlite3
      - libbrotli1
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DBUILD_TESTING=OFF
    prime:
      - -usr/lib/*/cmake/*
      - -usr/include/*
      - -usr/share/ECM/*
      - -usr/share/man/*
      - -usr/bin/X11
      - -usr/lib/gcc/$CRAFT_ARCH_TRIPLET_BUILD_FOR/6.0.0
      - -usr/lib/aspell/*
      - -usr/share/lintian
  gpu-2404:
    after: [koko]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/gpu-2404-cleanup mesa-2404
    prime:
      - bin/gpu-2404-wrapper
  cleanup:
    after:
      - koko
    plugin: nil
    build-snaps:
      - core24
      - kf6-core24
    override-prime: |
      set -eux
      for snap in "core24" "kf6-core24"; do
          cd "/snap/$snap/current" && find . -type f,l -exec rm -rf "${CRAFT_PRIME}/{}" \;
      done

